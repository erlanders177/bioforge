name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install numpy hypothesis pytest pytest-benchmark

      - name: Compile C engine
        run: python bioforge/engine/build.py
        continue-on-error: true   # fallback to NumPy if GCC not available

      - name: Run tests
        run: pytest tests/ -v --tb=short --benchmark-disable
