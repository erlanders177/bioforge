name: Build wheels

# Construye wheels nativos (con motor C compilado) para Windows, Linux y macOS,
# más el sdist, y los publica con Trusted Publishing (sin tokens):
#   • Disparo manual (Run workflow) -> publica en TestPyPI (ensayo).
#   • Empujar un tag vX.Y.Z         -> publica en PyPI (lanzamiento real).

on:
  workflow_dispatch:        # botón "Run workflow" -> ensayo en TestPyPI
  push:
    tags:
      - "v*"                # tag de versión -> publicación real en PyPI

jobs:
  wheels:
    name: Wheel · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21.3
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build --sdist
          python -m twine check dist/*
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # ── Ensayo: disparo manual -> TestPyPI ──────────────────────────────────────
  publish-testpypi:
    name: Publish · TestPyPI (ensayo)
    needs: [wheels, sdist]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # Trusted Publishing (OIDC) — sin tokens
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true   # re-ejecutar el ensayo no falla por duplicado

  # ── Lanzamiento: tag vX.Y.Z -> PyPI ─────────────────────────────────────────
  publish-pypi:
    name: Publish · PyPI (real)
    needs: [wheels, sdist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
