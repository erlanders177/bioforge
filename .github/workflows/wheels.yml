name: Build wheels

# Construye wheels nativos (con motor C compilado) para Windows, Linux y macOS,
# más el sdist. Se dispara manualmente o al empujar un tag de versión (vX.Y.Z).
# Los wheels quedan como artefactos descargables; la publicación a PyPI es un
# paso aparte (manual, con el token del autor).

on:
  workflow_dispatch:        # botón "Run workflow" en la pestaña Actions
  push:
    tags:
      - "v*"

jobs:
  wheels:
    name: Wheel · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # que un OS no cancele a los otros
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21.3

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
