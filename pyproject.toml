[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "bioforge"
version = "1.0.0"
description = "High-performance bioinformatics engine for Edge Computing — 5-bit encoding, vectorised NumPy core, optional C backend"
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    {name = "Aarón Aranda Torrijos", email = "noe9601@gmail.com"},
]
keywords = ["bioinformatics", "genomics", "sequence-analysis", "edge-computing", "numpy"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
]
requires-python = ">=3.10"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.0",
]

[project.urls]
Homepage = "https://github.com/erlanders177/bioforge"
Source   = "https://github.com/erlanders177/bioforge"
Issues   = "https://github.com/erlanders177/bioforge/issues"

[project.scripts]
bioforge-analyze = "bioforge.analyze:main"

[tool.setuptools.packages.find]
where   = ["."]
include = ["bioforge*"]
